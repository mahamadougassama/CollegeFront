<section class="login-page">


    <!-- Partie gauche -->

    <div class="login-left">

        <div class="overlay">

            <h1>
                Collège Royal
            </h1>

            <p>
                Espace Administration
            </p>

            <span>
                La plateforme de gestion de votre établissement
            </span>

        </div>

    </div>




    <!-- Partie droite -->

    <div class="login-right">


        <div class="login-card">


            <div class="logo">

                🎓

            </div>


            <h2>
                Bienvenue
            </h2>


            <p>
                Connectez-vous pour accéder au tableau de bord
            </p>




            <form>


                <div class="input-group">

                    <label>
                        nom
                    </label>

                    <input 
                    type="text" name="nom"
                    placeholder="Entrer votre nom"
                    [(ngModel)]="admin.nom"
                    >

                </div>




                <div class="input-group">

                    <label>
                        motDePasse
                    </label>

                    <input 
                    type="password" name="motDePasse"
                    placeholder="Entrer votre mot de passe"
                    [(ngModel)]="admin.motDePasse"
                    >

                </div>




              <a (click)="connexion()">Connecter</a>



            </form>


        </div>


    </div>


</section>
