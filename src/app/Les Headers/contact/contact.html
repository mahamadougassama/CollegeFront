<section class="contact">


    <div class="contact-title">

        <h2>
            Contactez-nous
        </h2>

        <p>
            Nous sommes à votre disposition pour répondre
            à toutes vos questions.
        </p>

    </div>



    <div class="contact-container">


        <!-- Informations -->

        <div class="contact-info">


            <div class="info-box">

                <span>📍</span>

                <div>
                    <h3>
                        Adresse
                    </h3>

                    <p>
                        Collège Royal Bamako, Mali
                    </p>
                </div>

            </div>



            <div class="info-box">

                <span>📞</span>

                <div>
                    <h3>
                        Téléphone
                    </h3>

                    <p>
                        +223 XX XX XX XX
                    </p>
                </div>

            </div>



            <div class="info-box">

                <span>✉</span>

                <div>
                    <h3>
                        Email
                    </h3>

                    <p>
                        contact@collegeroyal.com
                    </p>
                </div>

            </div>



            <div class="info-box">

                <span>🕒</span>

                <div>
                    <h3>
                        Horaires
                    </h3>

                    <p>
                        Lundi - Samedi : 08h - 17h
                    </p>
                </div>

            </div>


        </div>




        <!-- Localisation -->

        <div class="map">


            <iframe
                src="https://www.google.com/maps/embed..."
                width="100%"
                height="350"
                style="border:0;"
                allowfullscreen=""
                loading="lazy">
            </iframe>


        </div>


    </div>




    <!-- Formulaire -->

    <div class="contact-form">


        <h2>
            Envoyez-nous un message
        </h2>


        <input type="text" placeholder="Votre nom">


        <input type="email" placeholder="Votre email">


        <textarea placeholder="Votre message"></textarea>


        <button>
            Envoyer
        </button>


    </div>


</section>
